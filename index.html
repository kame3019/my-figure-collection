<!DOCTYPE html>
<html class="dark" lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Figure Vault Merge V1</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f9d406",
                        "background-dark": "#23200f"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
        .page { display: none; }
        .page.show { display: block; }
        .mode-active { background: #f9d406 !important; color: #23200f !important; border-color: #f9d406 !important; }
        .nav-active { color: #f9d406 !important; }
        .nav-active .material-symbols-outlined { font-variation-settings: "FILL" 1, "wght" 600, "GRAD" 0, "opsz" 24; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased">
    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">
        <header class="flex items-center justify-between px-4 py-4 bg-background-dark border-b border-primary/10">
            <div class="flex items-center gap-3">
                <div class="bg-primary rounded-lg p-1.5 flex items-center justify-center">
                    <span class="material-symbols-outlined text-background-dark font-bold">token</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Figure Vault</h1>
                    <p class="text-[11px] text-primary/70">Stitch Merge UI</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button id="headerSearchBtn" class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <div class="h-9 w-9 rounded-full border-2 border-primary overflow-hidden bg-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary">person</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto pb-28 no-scrollbar">
            <section id="pageCollection" class="page show">
                <section class="p-4 flex gap-3 overflow-x-auto no-scrollbar" id="summaryStats"></section>

                <section class="px-4 pb-2">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                        <input id="searchInput" class="w-full rounded-xl border border-primary/15 bg-white/5 py-3 pl-10 pr-4 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="搜尋模型、品牌、系列、分類…" />
                    </div>
                </section>

                <section class="px-4 py-2">
                    <div class="flex gap-2 overflow-x-auto no-scrollbar" id="categoryChips"></div>
                </section>

                <section class="px-4 py-2">
                    <div class="grid grid-cols-4 gap-2">
                        <button class="modeBtn rounded-full border border-primary/15 bg-white/5 px-2 py-2 text-[12px] font-semibold text-slate-200 mode-active" data-mode="list">列表</button>
                        <button class="modeBtn rounded-full border border-primary/15 bg-white/5 px-2 py-2 text-[12px] font-semibold text-slate-200" data-mode="grid">網格</button>
                        <button class="modeBtn rounded-full border border-primary/15 bg-white/5 px-2 py-2 text-[12px] font-semibold text-slate-200" data-mode="compact">卡片</button>
                        <button class="modeBtn rounded-full border border-primary/15 bg-white/5 px-2 py-2 text-[12px] font-semibold text-slate-200" data-mode="wall">收藏牆</button>
                    </div>
                </section>

                <section class="px-4 py-2">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="sortSelect" class="w-full rounded-xl border border-primary/15 bg-white/5 px-3 py-3 text-sm text-slate-100 focus:border-primary focus:ring-primary">
                            <option value="date_desc">最新加入</option>
                            <option value="date_asc">最舊加入</option>
                            <option value="price_desc">價錢高到低</option>
                            <option value="price_asc">價錢低到高</option>
                            <option value="name_asc">名稱 A-Z</option>
                            <option value="name_desc">名稱 Z-A</option>
                        </select>

                        <select id="statusFilter" class="w-full rounded-xl border border-primary/15 bg-white/5 px-3 py-3 text-sm text-slate-100 focus:border-primary focus:ring-primary">
                            <option value="">全部狀態</option>
                            <option value="未開封">未開封</option>
                            <option value="已開封">已開封</option>
                            <option value="展示中">展示中</option>
                            <option value="已售出">已售出</option>
                            <option value="願望清單">願望清單</option>
                        </select>
                    </div>
                </section>

                <section class="px-4 py-4">
                    <div class="flex items-center justify-between mb-4">
                        <h2 id="collectionTitle" class="text-xl font-bold">My Collection</h2>
                        <div id="resultNote" class="text-primary text-sm font-semibold">0 件</div>
                    </div>

                    <div id="collectionList"></div>
                </section>
            </section>

            <section id="pageAdd" class="page px-4 py-4 space-y-4">
                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h2 class="text-xl font-bold mb-3">新增 / 修改收藏</h2>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <input id="name" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="模型名稱" />
                        <input id="brand" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="品牌 / 廠商" />
                    </div>

                    <div class="mt-4">
                        <div class="mb-2 text-sm font-semibold text-primary">品牌 Logo 快選</div>
                        <div id="brandPresetPicker" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-3">
                        <input id="brandLogoUrl" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="品牌 logo 網址" />
                        <input id="brandLogoFile" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 file:mr-3 file:rounded-lg file:border-0 file:bg-primary file:px-3 file:py-2 file:text-sm file:font-semibold file:text-background-dark" type="file" accept="image/*" />
                    </div>

                    <button id="saveBrandLibBtn" class="mt-3 w-full rounded-xl bg-primary px-4 py-3 text-sm font-bold text-background-dark">加入品牌 Logo 庫</button>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-4">
                        <input id="series" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="系列 / 作品" />
                        <input id="itemCode" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="商品編號 / 條碼" />
                    </div>

                    <div class="mt-4">
                        <div class="mb-2 text-sm font-semibold text-primary">系列 Logo 快選</div>
                        <div id="seriesPresetPicker" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-3">
                        <input id="seriesLogoUrl" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="系列 logo 網址" />
                        <input id="seriesLogoFile" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 file:mr-3 file:rounded-lg file:border-0 file:bg-primary file:px-3 file:py-2 file:text-sm file:font-semibold file:text-background-dark" type="file" accept="image/*" />
                    </div>

                    <button id="saveSeriesLibBtn" class="mt-3 w-full rounded-xl bg-primary px-4 py-3 text-sm font-bold text-background-dark">加入系列 Logo 庫</button>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-4">
                        <input id="price" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="購入價 HKD" type="number" />
                        <input id="date" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 focus:border-primary focus:ring-primary" type="date" />
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-3">
                        <input id="category" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="分類" />
                        <input id="location" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="擺放位置 / 展示櫃" />
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-3">
                        <select id="status" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 focus:border-primary focus:ring-primary">
                            <option>未開封</option>
                            <option>已開封</option>
                            <option>展示中</option>
                            <option>已售出</option>
                            <option>願望清單</option>
                        </select>

                        <input id="sourceLink" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="產品來源連結" />
                    </div>

                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 mt-3">
                        <input id="photo" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 file:mr-3 file:rounded-lg file:border-0 file:bg-primary file:px-3 file:py-2 file:text-sm file:font-semibold file:text-background-dark" type="file" accept="image/*" capture="environment" />
                        <input id="photoLibrary" class="rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 file:mr-3 file:rounded-lg file:border-0 file:bg-primary file:px-3 file:py-2 file:text-sm file:font-semibold file:text-background-dark" type="file" accept="image/*" />
                    </div>

                    <textarea id="note" class="mt-3 rounded-xl border border-primary/15 bg-background-dark px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-primary focus:ring-primary" placeholder="備註"></textarea>

                    <button id="saveBtn" class="mt-4 w-full rounded-xl bg-primary px-4 py-3 text-sm font-bold text-background-dark">儲存收藏</button>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-bold">Logo Library 管理</h3>
                        <div class="text-xs text-primary/70">預設 + 自訂都可刪</div>
                    </div>

                    <div class="mt-4 flex items-center justify-between">
                        <div class="font-semibold">品牌 Logos</div>
                        <div id="brandLibCount" class="text-xs text-primary/70">0 個</div>
                    </div>
                    <div id="brandLibraryManager" class="mt-3 space-y-2"></div>

                    <div class="mt-5 flex items-center justify-between">
                        <div class="font-semibold">系列 Logos</div>
                        <div id="seriesLibCount" class="text-xs text-primary/70">0 個</div>
                    </div>
                    <div id="seriesLibraryManager" class="mt-3 space-y-2"></div>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h3 class="text-lg font-bold">備份 / 還原</h3>
                    <p class="mt-2 text-xs leading-6 text-slate-400">收藏資料、品牌 Logo 庫、系列 Logo 庫會一齊備份。</p>

                    <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-3">
                        <button id="exportBtn" class="rounded-xl bg-primary px-4 py-3 text-sm font-bold text-background-dark">⬇️ 匯出 JSON</button>
                        <button id="importBtn" class="rounded-xl bg-white/10 px-4 py-3 text-sm font-bold text-slate-100">⬆️ 匯入 JSON</button>
                        <button id="clearBtn" class="rounded-xl bg-white/10 px-4 py-3 text-sm font-bold text-slate-100">🗑️ 清空資料</button>
                    </div>

                    <input id="importFile" type="file" accept=".json,application/json" class="hidden" />
                    <div id="backupStatus" class="mt-3 text-xs text-primary/70">未匯出 / 未匯入</div>
                </div>
            </section>

            <section id="pageStats" class="page px-4 py-4 space-y-4">
                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <div class="flex items-center justify-between gap-3">
                        <h2 class="text-xl font-bold">統計總覽</h2>
                        <select id="statsYearFilter" class="rounded-xl border border-primary/15 bg-background-dark px-3 py-2 text-sm text-slate-100 focus:border-primary focus:ring-primary"></select>
                    </div>

                    <div id="statsOverview" class="mt-4"></div>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h3 class="text-lg font-bold">最貴收藏排行榜</h3>
                    <div id="topRanking" class="mt-3"></div>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h3 class="text-lg font-bold">品牌分佈</h3>
                    <div id="brandBreakdown" class="mt-3"></div>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h3 class="text-lg font-bold">系列分佈</h3>
                    <div id="seriesBreakdown" class="mt-3"></div>
                </div>

                <div class="rounded-2xl border border-primary/15 bg-white/5 p-4">
                    <h3 class="text-lg font-bold">月度統計</h3>
                    <div id="monthlyBreakdown" class="mt-3"></div>
                </div>
            </section>
        </main>

        <nav class="absolute bottom-0 left-0 right-0 z-20 pb-6 pt-2 px-6 bg-background-dark border-t border-primary/10">
            <div class="flex items-center justify-between">
                <button id="navCollection" class="flex flex-col items-center gap-1 nav-active">
                    <span class="material-symbols-outlined">grid_view</span>
                    <span class="text-[10px] font-bold uppercase">Collection</span>
                </button>

                <button id="navWishlist" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">favorite</span>
                    <span class="text-[10px] font-bold uppercase">Wishlist</span>
                </button>

                <div class="-mt-12">
                    <button id="navAddCenter" class="bg-primary text-background-dark h-14 w-14 rounded-full flex items-center justify-center shadow-lg shadow-primary/20 border-4 border-background-dark">
                        <span class="material-symbols-outlined text-3xl">add</span>
                    </button>
                </div>

                <button id="navStats" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">bar_chart</span>
                    <span class="text-[10px] font-bold uppercase">Stats</span>
                </button>

                <button id="navManage" class="flex flex-col items-center gap-1 text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span class="text-[10px] font-bold uppercase">Manage</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        const STABLE_KEY = "figure_vault_stitch_merge_v1_items";
        const BRAND_LIB_KEY = "figure_vault_stitch_merge_v1_brand_lib";
        const SERIES_LIB_KEY = "figure_vault_stitch_merge_v1_series_lib";

        const LEGACY_KEYS = [
            "figure_collector_v89_readable_master",
            "figure_collector_v88_master",
            "figure_collector_v82_master",
            "figure_collector_v81_master",
            "figure_collector_v8_master",
            "figure_collector_v85_master",
            "figure_collector_v86_master",
            "figure_collector_v9_master",
            "figure_collector_pro_clean_v1"
        ];

        const BRAND_DEFAULTS = [
            { name: "Bandai", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Bandai_Logo.svg/512px-Bandai_Logo.svg.png" },
            { name: "Good Smile", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Good_Smile_Company_logo.svg/512px-Good_Smile_Company_logo.svg.png" },
            { name: "Kotobukiya", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Kotobukiya_logo.svg/512px-Kotobukiya_logo.svg.png" }
        ];

        const SERIES_DEFAULTS = [
            { name: "Gundam", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Gundam_series_logo.svg/512px-Gundam_series_logo.svg.png" },
            { name: "SHF", logo: "https://tamashiiweb.com/images/common/logo_tamashii.png" },
            { name: "Chiikawa", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Chiikawa_logo.svg/512px-Chiikawa_logo.svg.png" }
        ];

        let items = [];
        let brandLibrary = [];
        let seriesLibrary = [];
        let view = "owned";
        let mode = "list";

        function money(v) {
            return "$" + Number(v || 0).toLocaleString("en-HK", { maximumFractionDigits: 2 });
        }

        function uid() {
            return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
        }

        function save() {
            localStorage.setItem(STABLE_KEY, JSON.stringify(items));
            localStorage.setItem(BRAND_LIB_KEY, JSON.stringify(brandLibrary));
            localStorage.setItem(SERIES_LIB_KEY, JSON.stringify(seriesLibrary));
        }

        function normalizeRecord(raw) {
            if (!raw || typeof raw !== "object") {
                return null;
            }

            return {
                id: raw.id || uid(),
                name: raw.name || "",
                brand: raw.brand || "",
                brandLogo: raw.brandLogo || "",
                series: raw.series || "",
                seriesLogo: raw.seriesLogo || "",
                itemCode: raw.itemCode || raw.item_code || "",
                price: raw.price || "",
                date: raw.date || "",
                status: raw.status || "未開封",
                category: raw.category || "其他",
                location: raw.location || "",
                sourceLink: raw.sourceLink || "",
                note: raw.note || "",
                image: raw.image || ""
            };
        }

        function seedDefaultsIfNeeded() {
            if (!brandLibrary.length) {
                brandLibrary = [...BRAND_DEFAULTS];
            }
            if (!seriesLibrary.length) {
                seriesLibrary = [...SERIES_DEFAULTS];
            }
        }

        function loadData() {
            try {
                brandLibrary = JSON.parse(localStorage.getItem(BRAND_LIB_KEY) || "[]");
            } catch (e) {
                brandLibrary = [];
            }

            try {
                seriesLibrary = JSON.parse(localStorage.getItem(SERIES_LIB_KEY) || "[]");
            } catch (e) {
                seriesLibrary = [];
            }

            seedDefaultsIfNeeded();

            const stable = localStorage.getItem(STABLE_KEY);

            if (stable) {
                try {
                    items = JSON.parse(stable).map(normalizeRecord).filter(Boolean);
                    save();
                    return;
                } catch (e) {}
            }

            for (const key of LEGACY_KEYS) {
                const data = localStorage.getItem(key);
                if (!data) continue;

                try {
                    const parsed = JSON.parse(data);
                    if (Array.isArray(parsed) && parsed.length) {
                        items = parsed.map(normalizeRecord).filter(Boolean);
                        save();
                        return;
                    }
                } catch (e) {}
            }

            items = [
                {
                    id: uid(),
                    name: "RX-78-2 Gundam",
                    category: "高達",
                    series: "Gundam",
                    seriesLogo: SERIES_DEFAULTS[0].logo,
                    brand: "Bandai",
                    brandLogo: BRAND_DEFAULTS[0].logo,
                    price: 189,
                    date: "2026-03-02",
                    itemCode: "HG-RX78",
                    status: "未開封",
                    location: "展示櫃 A",
                    sourceLink: "",
                    note: "HG 系列，未開盒。",
                    image: ""
                }
            ];

            save();
        }

        function makeDefaultImage(label) {
            const safe = (label || "Figure").replace(/[<>&]/g, "");
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
                    <rect width="100%" height="100%" fill="#2a2616"/>
                    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#f9d406" font-size="28" font-family="Arial">${safe}</text>
                </svg>
            `;
            return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
        }

        function showPage(id) {
            document.querySelectorAll(".page").forEach(page => page.classList.remove("show"));
            document.getElementById(id).classList.add("show");
        }

        function setActiveNav(key) {
            const mapping = {
                collection: "navCollection",
                wishlist: "navWishlist",
                stats: "navStats",
                manage: "navManage"
            };

            Object.values(mapping).forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove("nav-active");
                el.classList.add("text-slate-500");
            });

            if (mapping[key]) {
                const activeEl = document.getElementById(mapping[key]);
                activeEl.classList.add("nav-active");
                activeEl.classList.remove("text-slate-500");
            }
        }

        function renderPresetPickers() {
            const brandWrap = document.getElementById("brandPresetPicker");
            const seriesWrap = document.getElementById("seriesPresetPicker");

            brandWrap.innerHTML = brandLibrary.map(item => `
                <button class="rounded-full border border-primary/15 bg-white/5 px-3 py-2 text-xs text-slate-100" type="button" onclick="applyBrandPreset('${escapeText(item.name)}','${escapeText(item.logo)}')">
                    ${item.name}
                </button>
            `).join("");

            seriesWrap.innerHTML = seriesLibrary.map(item => `
                <button class="rounded-full border border-primary/15 bg-white/5 px-3 py-2 text-xs text-slate-100" type="button" onclick="applySeriesPreset('${escapeText(item.name)}','${escapeText(item.logo)}')">
                    ${item.name}
                </button>
            `).join("");
        }

        function escapeText(text) {

        function refreshCategories() {
            const categoryFilter = document.getElementById("categoryFilter");
            const set = new Set(["全部分類"]);

            items.forEach(item => set.add(item.category || "其他"));

            const current = categoryFilter.value;
            categoryFilter.innerHTML = "";

            [...set].forEach(value => {
                const option = document.createElement("option");
                option.value = value === "全部分類" ? "" : value;
                option.textContent = value;

                if (option.value === current) {
                    option.selected = true;
                }

                categoryFilter.appendChild(option);
            });
        }

        function ownedItems() {
            return items.filter(item => item.status !== "願望清單");
        }

        function filteredItems() {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            const category = document.getElementById("categoryFilter").value;
            const sort = document.getElementById("sortSelect").value;
            const statusFilter = document.getElementById("statusFilter").value;

            let arr = items.filter(item => {
                const matchesView = view === "owned" ? item.status !== "願望清單" : item.status === "願望清單";
                const text = [item.name, item.brand, item.series, item.category, item.note, item.itemCode, item.location].join(" ").toLowerCase();

                return matchesView &&
                    (!query || text.includes(query)) &&
                    (!category || item.category === category) &&
                    (!statusFilter || item.status === statusFilter);
            });

            arr.sort((a, b) => {
                switch (sort) {
                    case "date_asc":
                        return new Date(a.date || 0) - new Date(b.date || 0);
                    case "price_desc":
                        return Number(b.price || 0) - Number(a.price || 0);
                    case "price_asc":
                        return Number(a.price || 0) - Number(b.price || 0);
                    case "name_asc":
                        return (a.name || "").localeCompare(b.name || "");
                    case "name_desc":
                        return (b.name || "").localeCompare(a.name || "");
                    default:
                        return new Date(b.date || 0) - new Date(a.date || 0);
                }
            });

            return arr;
        }

        function getYearOptions() {

            items.forEach(item => {

                    years.add(item.date.slice(0, 4));
                }
            });

            return [...years].sort((a, b) => b.localeCompare(a));
        }

            const el = document.getElementById("statsYearFilter");

            const years = getYearOptions();

            el.innerHTML = '<option value="">全部年份</option>' + years.map(y => `<option value="${y}">${y} 年</option>`).join("");

            if (years.includes(current)) {
                el.value = current;
            }
        }

            return owned.filter(item => (item.date || "").startsWith(selectedYear + "-"));
        }

        function renderStats() {
            renderYearFilter();

            const filtered = getFilteredStatsItems();
            const selectedYear = document.getElementById("statsYearFilter").value;

            const total = filtered.reduce((sum, item) => sum + Number(item.price || 0), 0);
            const count = filtered.length;
            const avg = count ? total / count : 0;

            const monthMap = {};
            filtered.forEach(item => {
                const monthKey = item.date ? item.date.slice(0, 7) : "未填日期";

                if (!monthMap[monthKey]) {
                    monthMap[monthKey] = { total: 0, count: 0 };
                }

                monthMap[monthKey].total += Number(item.price || 0);
                monthMap[monthKey].count += 1;
            });

            const brandMap = {};
            filtered.forEach(item => {
                const key = item.brand || "未填品牌";
                brandMap[key] = (brandMap[key] || 0) + Number(item.price || 0);
            });

            const seriesMap = {};
            filtered.forEach(item => {
                const key = item.series || "未填系列";
                seriesMap[key] = (seriesMap[key] || 0) + Number(item.price || 0);
            });

            const activeYear = selectedYear || new Date().getFullYear().toString();

                    </div>

            `).join("") : '<div class="rounded-xl border border-primary/10 bg-white/5 p-4 text-center text-slate-400">未有排行榜資料。</div>';

            function renderBarSection(mapObj, targetId) {
                const rows = Object.entries(mapObj).sort((a, b) => b[1] - a[1]).slice(0, 6);
                const max = rows.length ? rows[0][1] : 1;

                document.getElementById(targetId).innerHTML = rows.length ? rows.map(([name, value]) => `

            renderBarSection(brandMap, "brandBreakdown");
            renderBarSection(seriesMap, "seriesBreakdown");

            const monthRows = Object.entries(monthMap).sort((a, b) => b[0].localeCompare(a[0]));

            document.getElementById("monthlyBreakdown").innerHTML = monthRows.length ? `

        async function fileToDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function saveRecord() {
            const saveBtn = document.getElementById("saveBtn");
            const id = saveBtn.dataset.editing || uid();
            const old = items.find(item => item.id === id);

            let image = old?.image || "";
            let brandLogo = old?.brandLogo || "";
            let seriesLogo = old?.seriesLogo || "";

            const photo = document.getElementById("photo").files[0] || document.getElementById("photoLibrary").files[0];
            if (photo) {
                image = await fileToDataURL(photo);
            }

            const brandLogoFile = document.getElementById("brandLogoFile").files[0];
            const seriesLogoFile = document.getElementById("seriesLogoFile").files[0];
            const brandLogoUrl = document.getElementById("brandLogoUrl").value.trim();
            const seriesLogoUrl = document.getElementById("seriesLogoUrl").value.trim();

            if (brandLogoFile) {
                brandLogo = await fileToDataURL(brandLogoFile);
            } else if (brandLogoUrl) {
                brandLogo = brandLogoUrl;
            }

            if (seriesLogoFile) {
                seriesLogo = await fileToDataURL(seriesLogoFile);
            } else if (seriesLogoUrl) {
                seriesLogo = seriesLogoUrl;
            }

            const record = {
                id: id,
                name: document.getElementById("name").value.trim(),
                brand: document.getElementById("brand").value.trim(),
                brandLogo: brandLogo,
                series: document.getElementById("series").value.trim(),
                seriesLogo: seriesLogo,
                itemCode: document.getElementById("itemCode").value.trim(),
                price: document.getElementById("price").value,
                date: document.getElementById("date").value,
                status: document.getElementById("status").value,
                category: document.getElementById("category").value.trim() || "其他",
                location: document.getElementById("location").value.trim(),
                sourceLink: document.getElementById("sourceLink").value.trim(),
                note: document.getElementById("note").value.trim(),
                image: image
            };

            if (old) {
                items = items.map(item => item.id === id ? record : item);
            } else {
                items.unshift(record);
            }

            save();
            clearForm();
            document.getElementById("backupStatus").textContent = "已儲存收藏";
            render();
            showPage("pageCollection");
            setActiveNav("collection");
        }

        function clearForm() {
            [
                "name", "brand", "series", "itemCode", "price", "date", "category", "location",
                "sourceLink", "note", "brandLogoUrl", "seriesLogoUrl", "photo", "photoLibrary",
                "brandLogoFile", "seriesLogoFile"
            ].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.value = "";
                }
            });

            document.getElementById("status").value = "未開封";
            delete document.getElementById("saveBtn").dataset.editing;
        }

        window.editItem = function(id) {
            const item = items.find(x => x.id === id);
            if (!item) return;

            document.getElementById("name").value = item.name || "";
            document.getElementById("brand").value = item.brand || "";
            document.getElementById("brandLogoUrl").value = item.brandLogo || "";
            document.getElementById("series").value = item.series || "";
            document.getElementById("seriesLogoUrl").value = item.seriesLogo || "";
            document.getElementById("itemCode").value = item.itemCode || "";
            document.getElementById("price").value = item.price || "";
            document.getElementById("date").value = item.date || "";
            document.getElementById("status").value = item.status || "未開封";
            document.getElementById("category").value = item.category || "";
            document.getElementById("location").value = item.location || "";
            document.getElementById("sourceLink").value = item.sourceLink || "";
            document.getElementById("note").value = item.note || "";
            document.getElementById("saveBtn").dataset.editing = id;

            showPage("pageAdd");
            setActiveNav("manage");
        };

        window.deleteItem = function(id) {
            if (!confirm("確定刪除呢件收藏？")) return;
            items = items.filter(item => item.id !== id);

            render();

        async function addBrandLibrary() {
            const name = document.getElementById("brand").value.trim();
            const url = document.getElementById("brandLogoUrl").value.trim();
            const file = document.getElementById("brandLogoFile").files[0];

            if (!name || (!url && !file)) {
                alert("先填品牌名稱同 logo");
                return;
            }

            const logo = file ? await fileToDataURL(file) : url;
            brandLibrary = brandLibrary.filter(item => item.name !== name);
            brandLibrary.unshift({ name, logo });

            save();
            renderPresetPickers();
            renderLogoManagers();
            document.getElementById("backupStatus").textContent = "已加入品牌 Logo 庫";
        }

            const logo = file ? await fileToDataURL(file) : url;
            seriesLibrary = seriesLibrary.filter(item => item.name !== name);

                    <div class="flex items-center gap-3">
                        <span class="h-8 w-8 rounded-lg overflow-hidden bg-white/10 border border-primary/10"><img class="h-full w-full object-contain" src="${item.logo}" alt=""></span>
                        <span class="font-medium">${item.name}</span>
                    </div>
                    <button class="rounded-lg bg-white/10 px-3 py-2 text-xs font-semibold" onclick="deleteSeriesLogo(${index})">刪除</button>
                </div>
            `).join("") : '<div class="rounded-xl border border-primary/10 bg-white/5 p-4 text-center text-slate-400">未有系列 Logo。</div>';
        }

        window.deleteBrandLogo = function(index) {
            const item = brandLibrary[index];
            if (!item) return;

            if (!confirm("確定刪除品牌 Logo：" + item.name + "？")) {
                return;
            }

            brandLibrary.splice(index, 1);
            save();
            renderPresetPickers();
            renderLogoManagers();
            document.getElementById("backupStatus").textContent = "已刪除品牌 Logo";
        };

        window.deleteSeriesLogo = function(index) {
            const item = seriesLibrary[index];
            if (!item) return;

            if (!confirm("確定刪除系列 Logo：" + item.name + "？")) {
                return;
            }

            seriesLibrary.splice(index, 1);
            save();
            renderPresetPickers();
            renderLogoManagers();
            document.getElementById("backupStatus").textContent = "已刪除系列 Logo";
        };

        function exportBackup() {
            const payload = {
                app: "Figure Vault Merge V1",
                version: 1,
                exported_at: new Date().toISOString(),
                items: items,
                brandLibrary: brandLibrary,
                seriesLibrary: seriesLibrary
            };

            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "figure_vault_merge_v1_backup.json";
            a.click();
            URL.revokeObjectURL(a.href);

            document.getElementById("backupStatus").textContent = "已匯出 JSON（含 Logo 庫）";
        }

        function importBackup(file) {
            const reader = new FileReader();

            reader.onload = function() {
                try {
                    const parsed = JSON.parse(reader.result);
                    const imported = Array.isArray(parsed) ? parsed : (parsed.items || []);

                    if (!Array.isArray(imported)) {
                        throw new Error("invalid");
                    }

                    items = imported.map(normalizeRecord).filter(Boolean);
                    brandLibrary = Array.isArray(parsed.brandLibrary) ? parsed.brandLibrary : [];
                    seriesLibrary = Array.isArray(parsed.seriesLibrary) ? parsed.seriesLibrary : [];

                    save();
                    renderPresetPickers();
                    render();
                    document.getElementById("backupStatus").textContent = "已匯入 JSON（含 Logo 庫）";
                    showPage("pageCollection");
                    setActiveNav("collection");
                } catch (e) {
                    document.getElementById("backupStatus").textContent = "匯入失敗：檔案格式不正確";
                }
            };

            reader.readAsText(file, "utf-8");
        }

        document.getElementById("saveBtn").onclick = saveRecord;
        document.getElementById("saveBrandLibBtn").onclick = addBrandLibrary;
        document.getElementById("saveSeriesLibBtn").onclick = addSeriesLibrary;
        document.getElementById("exportBtn").onclick = exportBackup;
        document.getElementById("importBtn").onclick = function() {
            document.getElementById("importFile").click();
        };
        document.getElementById("importFile").onchange = function(e) {
            const file = e.target.files[0];
            if (file) importBackup(file);
        };
        document.getElementById("clearBtn").onclick = function() {
            if (!confirm("確定清空全部收藏資料同 Logo 庫？")) return;
            items = [];
            brandLibrary = [...BRAND_DEFAULTS];
            seriesLibrary = [...SERIES_DEFAULTS];
            save();
            renderPresetPickers();
            render();
            document.getElementById("backupStatus").textContent = "已清空資料";
        };

        document.querySelectorAll(".modeBtn").forEach(btn => {
            btn.onclick = function() {
                mode = this.dataset.mode;
                document.querySelectorAll(".modeBtn").forEach(el => el.classList.remove("mode-active"));
                this.classList.add("mode-active");
                renderList();
            };
        });

        renderPresetPickers();
        render();
        setActiveNav("collection");
    </script>
</body>
</html>
