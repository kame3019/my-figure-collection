<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Figure Collector V8</title>
<meta name="theme-color" content="#0d0d0f">
<style>
:root{
  --bg:#0d0d0f;--card:#1a1b1f;--gold:#d4af37;--gold2:#9c7c21;--text:#f5f1e8;
  --muted:#b7ad9b;--line:#3a3017;--ok:#4caf50;--down:#d96b6b;--radius:20px;
  --shadow:0 16px 36px rgba(0,0,0,.35)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;color:var(--text);
  background:radial-gradient(circle at top,rgba(212,175,55,.08),transparent 24%),linear-gradient(180deg,#111214 0%,#0a0a0c 100%);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Yu Gothic","Noto Sans JP","PingFang TC",sans-serif
}
.wrap{max-width:620px;margin:auto;min-height:100vh;padding:max(18px,env(safe-area-inset-top)) 16px calc(110px + env(safe-area-inset-bottom))}
.card,.hero,.stat,.item,.rankRow{
  background:linear-gradient(180deg,rgba(29,30,35,.98),rgba(20,20,24,.98));
  border:1px solid rgba(212,175,55,.20);border-radius:var(--radius);box-shadow:var(--shadow)
}
.hero{
  padding:20px 18px 18px;margin-bottom:16px;
  background:radial-gradient(circle at 90% 12%,rgba(212,175,55,.10),transparent 26%),linear-gradient(180deg,rgba(31,32,37,.98),rgba(18,18,22,.98))
}
.eyebrow{font-size:12px;letter-spacing:.16em;color:var(--gold);margin-bottom:8px}
h1{margin:0 0 6px;font-size:30px;letter-spacing:-.04em}
.sub{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.page{display:none}.page.show{display:block}
.topToggle{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px;background:#111215;
  border:1px solid rgba(212,175,55,.16);border-radius:18px;margin:14px 0 12px
}
.toggleBtn,.tab,.modeBtn,.quickBtn,.ghostBtn,.smallBtn{
  border:none;background:transparent;color:var(--muted);font-weight:700;cursor:pointer
}
.toggleBtn{padding:12px 10px;border-radius:14px;font-size:14px}
.toggleBtn.active,.modeBtn.active,.quickBtn.active{
  background:linear-gradient(180deg,rgba(212,175,55,.98),rgba(156,124,33,.98));color:#111
}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 0 14px}
.stat{padding:14px 12px}.k{font-size:11px;color:var(--gold);margin-bottom:7px}.v{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search,.field{
  background:linear-gradient(180deg,rgba(27,27,31,.98),rgba(17,17,20,.98));
  border:1px solid rgba(212,175,55,.16);border-radius:16px;padding:12px 13px
}
.search{margin-bottom:10px}
.search input,.field input,.field textarea,.field select{
  width:100%;border:none;outline:none;background:transparent;color:var(--text);font:inherit
}
.search input::placeholder,.field input::placeholder,.field textarea::placeholder{color:#8d8578}
.row,.modes,.twoCol,.backupRow{display:flex;gap:10px;margin-bottom:14px}
.quickBtn,.modeBtn,.ghostBtn,.smallBtn{
  background:linear-gradient(180deg,rgba(31,31,36,.98),rgba(20,20,24,.98));
  border:1px solid rgba(212,175,55,.16);border-radius:14px;padding:12px 12px;font-size:13px
}
.quickBtn,.modeBtn,.smallBtn{flex:1}
.primaryBtn{
  width:100%;border:none;border-radius:14px;padding:14px 15px;font-size:14px;font-weight:700;cursor:pointer;
  background:linear-gradient(180deg,rgba(212,175,55,.98),rgba(156,124,33,.98));color:#111
}
.smallBtn{padding:10px 12px}
.head{display:flex;justify-content:space-between;align-items:end;margin:14px 0 10px}
.head h2{margin:0;font-size:18px}
.small,.helper,.analysisTag{font-size:12px;color:var(--muted);line-height:1.5}
.list{display:grid;gap:12px}
.list.grid{grid-template-columns:1fr 1fr}
.list.wall{grid-template-columns:1fr 1fr 1fr}
.list.listview,.list.compact{grid-template-columns:1fr}
.item{overflow:hidden}
.thumb{
  height:180px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.12)),#27231a center/contain no-repeat;
  display:flex;align-items:center;justify-content:center;color:#a89d85;position:relative;font-size:14px
}
.list.wall .thumb{height:92px}.list.listview .item{display:flex;align-items:stretch}.list.listview .thumb{width:120px;min-height:120px;height:auto;flex:0 0 120px}
.pill{position:absolute;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:700}
.price{left:12px;bottom:12px;background:rgba(212,175,55,.95);color:#111}
.status{right:12px;top:12px;background:rgba(17,17,19,.9);border:1px solid rgba(212,175,55,.16);color:var(--text)}
.body{padding:14px;flex:1}.name{font-size:18px;font-weight:700;margin-bottom:5px}.meta{font-size:13px;line-height:1.5;color:var(--muted);margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{background:rgba(255,255,255,.04);color:#d8cfbf;border-radius:999px;padding:6px 10px;font-size:12px;border:1px solid rgba(212,175,55,.10)}
.note{font-size:13px;line-height:1.55;color:#e0d8cb;margin-bottom:12px;word-break:break-word}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn2{
  flex:1;border:none;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;cursor:pointer;
  background:linear-gradient(180deg,rgba(36,36,41,.98),rgba(24,24,28,.98));color:var(--text);border:1px solid rgba(212,175,55,.10)
}
.gain{color:var(--ok)!important;font-weight:700}.loss{color:var(--down)!important;font-weight:700}
.list.compact .item{display:flex;align-items:center;gap:12px;padding:12px}.list.compact .thumb{width:88px;height:88px;flex:0 0 88px;border-radius:16px}.list.compact .body{padding:0;flex:1}
.list.compact .pill,.list.compact .actions,.list.compact .note{display:none}.list.compact .meta{margin-bottom:8px}
.list.wall .body{padding:10px}.list.wall .name{font-size:14px;line-height:1.2}.list.wall .meta,.list.wall .note,.list.wall .actions{display:none}.list.wall .price{display:none}
.panel{padding:14px}.panelTitle{font-size:15px;font-weight:700;margin:0 0 10px;color:var(--gold)}.form{display:grid;gap:10px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}textarea{min-height:90px;resize:vertical}
.chartCard{padding:16px}.bars,.months,.rankingList{display:grid;gap:12px}.barRow{padding:12px 12px}.barTop{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}
.barName{font-size:13px;font-weight:600}.barVal{font-size:13px;font-weight:700;color:var(--gold)}.barTrack{height:10px;background:#1b1b1f;border-radius:999px;overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:999px}
.monthCard{padding:15px 16px}.monthTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.monthName{font-weight:700;font-size:15px}.monthAmount{font-weight:700;font-size:16px;color:var(--gold)}.monthMeta{font-size:12px;color:var(--muted)}
.rankRow{display:flex;justify-content:space-between;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(212,175,55,.10);border-radius:14px;padding:10px 12px}.rankLeft{display:flex;gap:10px;align-items:center}
.rankNo{width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(180deg,rgba(212,175,55,.98),rgba(156,124,33,.98));color:#111}
.empty{padding:40px 18px;text-align:center;color:var(--muted);background:linear-gradient(180deg,rgba(27,27,31,.98),rgba(17,17,20,.98));border:1px dashed rgba(212,175,55,.16);border-radius:18px}
.notice{padding:12px 14px;border:1px solid rgba(212,175,55,.16);border-radius:14px;background:rgba(255,255,255,.03);font-size:12px;color:var(--muted);margin-bottom:12px}
.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(12,12,14,.94);backdrop-filter:blur(10px);border-top:1px solid rgba(212,175,55,.16);display:grid;grid-template-columns:1fr 1fr 1fr;z-index:50;padding:10px 10px calc(10px + env(safe-area-inset-bottom))}
.tab{display:grid;gap:4px;justify-items:center;font-size:12px}.tab .ico{font-size:22px;line-height:1}.tab.active{color:var(--gold)}
@media (max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
@media (max-width:430px){.list.grid{grid-template-columns:1fr}.list.wall{grid-template-columns:1fr 1fr}}
@media (max-width:390px){.row,.modes,.twoCol,.row2,.backupRow{display:grid;grid-template-columns:1fr}.list.wall{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="eyebrow">FIGURE COLLECTOR V8</div>
    <h1>My Figure Collection</h1>
    <div class="sub">真收藏版。重點加咗：資料遷移、備份 JSON、還原 JSON、穩定 key，改版都盡量保住紀錄。</div>
  </div>

  <section id="pageCollection" class="page show">
    <div class="topToggle">
      <button class="toggleBtn active" id="ownedBtn">📦 已在庫存</button>
      <button class="toggleBtn" id="wishBtn">🖤 願望清單</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">收藏數量</div><div class="v" id="countAll">0</div></div>
      <div class="stat"><div class="k">總花費</div><div class="v" id="sumPrice">$0</div></div>
      <div class="stat"><div class="k">現值總額</div><div class="v" id="currentTotal">$0</div></div>
      <div class="stat"><div class="k">升跌總額</div><div class="v" id="deltaTotal">$0</div></div>
    </div>
    <input id="searchInput" class="search" placeholder="搜尋模型、分類、系列…">
    <div class="modes" style="margin-top:12px">
      <button class="quickBtn active" data-mode="grid">網格</button>
      <button class="quickBtn" data-mode="listview">列表</button>
      <button class="quickBtn" data-mode="compact">卡片</button>
      <button class="quickBtn" data-mode="wall">收藏牆</button>
    </div>
    <div class="row">
      <select id="sortSelect" class="field">
        <option value="date_desc">最新加入</option>
        <option value="date_asc">最舊加入</option>
        <option value="price_desc">價錢高到低</option>
        <option value="price_asc">價錢低到高</option>
        <option value="current_desc">現值高到低</option>
        <option value="delta_desc">升幅高到低</option>
        <option value="name_asc">名稱 A-Z</option>
        <option value="name_desc">名稱 Z-A</option>
      </select>
      <select id="categoryFilter" class="field"></select>
    </div>
    <div class="head"><h2 id="collectionTitle">我的收藏</h2><div class="small" id="resultNote">0 件</div></div>
    <div id="list" class="list grid"></div>
  </section>

  <section id="pageAdd" class="page">
    <div class="card panel">
      <div class="panelTitle">新增 / 修改收藏</div>
      <div class="form">
        <div class="row2">
          <div class="field"><input id="name" placeholder="模型名稱"></div>
          <div class="field"><input id="brand" placeholder="品牌 / 廠商"></div>
        </div>
        <div class="row2">
          <div class="field"><input id="series" placeholder="系列 / 作品"></div>
          <div class="field"><input id="itemCode" placeholder="商品編號 / 條碼"></div>
        </div>
        <div class="row2">
          <div class="field"><input id="price" type="number" placeholder="入手價 HKD"></div>
          <div class="field"><input id="currentValue" type="number" placeholder="現值 HKD"></div>
        </div>
        <div class="row2">
          <div class="field"><input id="date" type="date"></div>
          <div class="field"><input id="category" placeholder="分類"></div>
        </div>
        <div class="row2">
          <div class="field"><select id="status"><option>未開封</option><option>已開封</option><option>展示中</option><option>已售出</option><option>願望清單</option></select></div>
          <div class="field"><input id="location" placeholder="擺放位置 / 展示櫃"></div>
        </div>
        <div class="row2">
          <div class="field"><input id="sourceLink" placeholder="產品來源連結"></div>
          <div class="field"><input id="sellPrice" type="number" placeholder="售出價"></div>
        </div>
        <div class="row2">
          <div class="field"><input id="photo" type="file" accept="image/*" capture="environment"><div class="helper">可直接用相機拍模型加入</div></div>
          <div class="field"><input id="photoLibrary" type="file" accept="image/*"><div class="helper">或由相簿選圖</div></div>
        </div>
        <div class="field"><textarea id="note" placeholder="備註"></textarea></div>
        <button class="primaryBtn" id="saveBtn">儲存收藏</button>
      </div>
    </div>

    <div class="card panel" style="margin-top:12px">
      <div class="panelTitle">備份 / 還原</div>
      <div class="notice">
        呢版會優先讀取舊版本資料，再搬到 V8 穩定資料庫。你之後再換 UI，只要保留同一個資料 key，就唔會無啦啦冇紀錄。
      </div>
      <div class="backupRow">
        <button class="smallBtn" id="exportBtn">⬇️ 匯出 JSON 備份</button>
        <button class="smallBtn" id="importBtn">⬆️ 匯入 JSON 還原</button>
        <button class="smallBtn" id="clearBtn">🗑️ 清空資料</button>
      </div>
      <input id="importFile" type="file" accept=".json,application/json" style="display:none">
      <div class="small" id="backupStatus">未匯出 / 未匯入</div>
    </div>
  </section>

  <section id="pageStats" class="page">
    <div class="stats">
      <div class="stat"><div class="k">已收藏總值</div><div class="v" id="statsTotal">$0</div></div>
      <div class="stat"><div class="k">現值總額</div><div class="v" id="statsCurrent">$0</div></div>
      <div class="stat"><div class="k">升跌總額</div><div class="v" id="statsDelta">$0</div></div>
      <div class="stat"><div class="k">願望清單數</div><div class="v" id="wishCount">0</div></div>
    </div>
    <div class="card chartCard" style="margin-bottom:12px"><div class="panelTitle">每月統計</div><div id="months"></div></div>
    <div class="card chartCard" style="margin-bottom:12px"><div class="panelTitle">最貴收藏排行榜</div><div id="rankingList"></div></div>
    <div class="card chartCard"><div class="panelTitle">品牌排行榜</div><div id="brandBars"></div></div>
  </section>
</div>

<nav class="tabs">
  <button class="tab active" data-page="pageCollection">🗂️<br>收藏</button>
  <button class="tab" data-page="pageAdd">➕<br>新增</button>
  <button class="tab" data-page="pageStats">📊<br>統計</button>
</nav>

<script>
const STABLE_KEY='figure_collector_v8_master';
const LEGACY_KEYS=[
  'figure_collector_pro_clean_v1',
  'figure_collector_pro_route2',
  'my_figure_collection_v7_lite',
  'my_figure_collection_v5_black_gold',
  'my_figure_collection_v42',
  'my_figure_collection_v41',
  'my_figure_collection_v4',
  'figure_collection_v3',
  'figure_collection_v3',
  'figures'
];
let items=[];
let view='owned', mode='grid';

function money(v){return '$'+Number(v||0).toLocaleString('en-HK',{maximumFractionDigits:2})}
function deltaOf(item){return Number(item.currentValue||0)-Number(item.price||0)}
function save(){localStorage.setItem(STABLE_KEY, JSON.stringify(items))}
function uid(){return crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+Math.random().toString(16).slice(2)}
function toDataURL(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file)})}
function normalizeRecord(raw){
  if(!raw || typeof raw!=='object') return null;
  return {
    id: raw.id || uid(),
    name: raw.name || '',
    brand: raw.brand || '',
    series: raw.series || '',
    itemCode: raw.itemCode || raw.item_code || '',
    price: raw.price || '',
    currentValue: raw.currentValue || '',
    date: raw.date || '',
    status: raw.status || '未開封',
    category: raw.category || '其他',
    location: raw.location || '',
    sellPrice: raw.sellPrice || '',
    sourceLink: raw.sourceLink || '',
    note: raw.note || '',
    image: raw.image || ''
  };
}
function loadData(){
  const stable = localStorage.getItem(STABLE_KEY);
  if(stable){
    try{ items = JSON.parse(stable).map(normalizeRecord).filter(Boolean); return; }catch(e){}
  }
  for(const key of LEGACY_KEYS){
    const data = localStorage.getItem(key);
    if(!data) continue;
    try{
      const parsed = JSON.parse(data);
      if(Array.isArray(parsed) && parsed.length){
        items = parsed.map(normalizeRecord).filter(Boolean);
        save();
        document.getElementById('backupStatus').textContent = '已由舊版本資料自動搬到 V8';
        return;
      }
    }catch(e){}
  }
  items = [
    {id:uid(),name:'RX-78-2 Gundam',category:'高達',series:'Mobile Suit Gundam',brand:'Bandai',price:189,currentValue:260,date:'2026-03-02',itemCode:'HG-RX78',status:'未開封',location:'展示櫃上層',sellPrice:'',sourceLink:'',note:'HG 系列，未開盒。',image:''},
    {id:uid(),name:'幪面超人 1 號',category:'幪面超人',series:'Kamen Rider',brand:'Bandai',price:299,currentValue:340,date:'2026-02-15',itemCode:'SHF-KR1',status:'展示中',location:'書櫃 A',sellPrice:'',sourceLink:'',note:'已開封展示。',image:''},
    {id:uid(),name:'Chiikawa 公仔',category:'Chiikawa',series:'Chiikawa',brand:'Good Smile',price:129,currentValue:'',date:'2026-01-20',itemCode:'',status:'願望清單',location:'',sellPrice:'',sourceLink:'',note:'想入手。',image:''}
  ];
  save();
}
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.page===id));
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showPage(t.dataset.page));
document.getElementById('ownedBtn').onclick=()=>{view='owned';document.getElementById('ownedBtn').classList.add('active');document.getElementById('wishBtn').classList.remove('active');render()}
document.getElementById('wishBtn').onclick=()=>{view='wishlist';document.getElementById('wishBtn').classList.add('active');document.getElementById('ownedBtn').classList.remove('active');render()}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x.dataset.mode===mode));renderList()})
document.getElementById('searchInput').oninput=renderList;
document.getElementById('sortSelect').onchange=renderList;
document.getElementById('categoryFilter').onchange=renderList;

function refreshCategories(){
  const categoryFilter=document.getElementById('categoryFilter');
  const set=new Set(['全部分類']);
  items.forEach(i=>set.add(i.category||'其他'));
  const cur=categoryFilter.value;
  categoryFilter.innerHTML='';
  [...set].forEach(v=>{
    const o=document.createElement('option');
    o.value=v==='全部分類'?'':v;
    o.textContent=v;
    if(o.value===cur) o.selected=true;
    categoryFilter.appendChild(o);
  });
}
function ownedItems(){return items.filter(x=>x.status!=='願望清單')}
function filtered(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const cat=document.getElementById('categoryFilter').value;
  const sort=document.getElementById('sortSelect').value;
  let arr=items.filter(i=>{
    const matchesView=view==='owned'?i.status!=='願望清單':i.status==='願望清單';
    const t=[i.name,i.brand,i.series,i.category,i.note,i.itemCode,i.location].join(' ').toLowerCase();
    return matchesView && (!q||t.includes(q)) && (!cat||i.category===cat);
  });
  arr.sort((a,b)=>{
    switch(sort){
      case 'date_asc': return new Date(a.date||0)-new Date(b.date||0);
      case 'price_desc': return Number(b.price||0)-Number(a.price||0);
      case 'price_asc': return Number(a.price||0)-Number(b.price||0);
      case 'current_desc': return Number(b.currentValue||b.price||0)-Number(a.currentValue||a.price||0);
      case 'delta_desc': return deltaOf(b)-deltaOf(a);
      case 'name_asc': return (a.name||'').localeCompare(b.name||'');
      case 'name_desc': return (b.name||'').localeCompare(a.name||'');
      default: return new Date(b.date||0)-new Date(a.date||0);
    }
  });
  return arr;
}
function itemHtml(i){
  const d=deltaOf(i);
  const delta=i.currentValue?`<span class="chip ${d>=0?'gain':'loss'}">${d>=0?'+':''}${money(d).replace('$','')}</span>`:'';
  return `<div class="item">
    <div class="thumb" style="${i.image?`background-image:url('${i.image}')`:''}">
      ${i.image?'':'模型圖片'}
      ${i.status!=='願望清單'?`<div class="price">${money(i.price)}</div>`:''}
      <div class="pill status">${i.status||''}</div>
    </div>
    <div class="body">
      <div class="name">${i.name||''}</div>
      <div class="meta">${i.category||'其他'} · ${i.series||'未填系列'} · ${i.brand||'未填品牌'}</div>
      <div class="chips">
        ${i.location?`<span class="chip">${i.location}</span>`:''}
        ${i.date?`<span class="chip">${i.date}</span>`:''}
        ${i.currentValue?`<span class="chip">現值 ${money(i.currentValue)}</span>`:''}
        ${delta}
        ${i.itemCode?`<span class="chip">#${i.itemCode}</span>`:''}
      </div>
      ${i.note?`<div class="note">${i.note}</div>`:''}
      <div class="actions">
        ${i.sourceLink?`<button class="btn2" onclick="window.open('${i.sourceLink}','_blank')">打開連結</button>`:''}
        <button class="btn2" onclick="editItem('${i.id}')">修改</button>
        <button class="btn2" onclick="deleteItem('${i.id}')">刪除</button>
      </div>
    </div>
  </div>`;
}
function renderList(){
  const list=document.getElementById('list');
  list.className='list '+mode;
  const arr=filtered();
  document.getElementById('resultNote').textContent=arr.length+' 件';
  document.getElementById('collectionTitle').textContent=view==='owned'?'我的收藏':'願望清單';
  list.innerHTML=arr.length?arr.map(itemHtml).join(''):`<div class="empty">${view==='owned'?'還沒有收藏品':'還沒有願望清單'}</div>`;
}
function renderTop(){
  const owned=ownedItems();
  const total=owned.reduce((a,b)=>a+Number(b.price||0),0);
  const current=owned.reduce((a,b)=>a+Number(b.currentValue||b.price||0),0);
  const delta=current-total;
  document.getElementById('countAll').textContent=owned.length;
  document.getElementById('sumPrice').textContent=money(total);
  document.getElementById('currentTotal').textContent=money(current);
  const deltaTop=document.getElementById('deltaTotal');
  deltaTop.textContent=(delta>=0?'+':'')+money(delta).replace('$','');
  deltaTop.className='v '+(delta>=0?'gain':'loss');
  document.getElementById('statsTotal').textContent=money(total);
  document.getElementById('statsCurrent').textContent=money(current);
  const statsDelta=document.getElementById('statsDelta');
  statsDelta.textContent=(delta>=0?'+':'')+money(delta).replace('$','');
  statsDelta.className='v '+(delta>=0?'gain':'loss');
  document.getElementById('wishCount').textContent=items.filter(x=>x.status==='願望清單').length;
}
function renderStats(){
  const owned=ownedItems();
  const monthMap={};
  owned.forEach(i=>{
    if(!i.date) return;
    const key=i.date.slice(0,7);
    if(!monthMap[key]) monthMap[key]={total:0,count:0};
    monthMap[key].total+=Number(i.price||0);
    monthMap[key].count+=1;
  });
  const keys=Object.keys(monthMap).sort((a,b)=>b.localeCompare(a));
  document.getElementById('months').innerHTML=keys.length?keys.map(k=>`
    <div class="card monthCard">
      <div class="monthTop"><div class="monthName">${k.replace('-','年')}月</div><div class="monthAmount">${money(monthMap[k].total)}</div></div>
      <div class="monthMeta">本月記錄 ${monthMap[k].count} 件</div>
    </div>`).join(''):`<div class="empty">暫時未有每月統計資料。</div>`;
  const ranked=[...owned].sort((a,b)=>Number(b.price||0)-Number(a.price||0)).slice(0,5);
  document.getElementById('rankingList').innerHTML=ranked.length?ranked.map((i,idx)=>`
    <div class="rankRow">
      <div class="rankLeft"><div class="rankNo">${idx+1}</div><div><div style="font-weight:700">${i.name}</div><div class="small">${i.category||'其他'}</div></div></div>
      <div style="font-weight:700">${money(i.price)}</div>
    </div>`).join(''):`<div class="empty">未有排行榜資料。</div>`;
  const brands={};
  owned.forEach(i=>brands[i.brand||'未填品牌']=(brands[i.brand||'未填品牌']||0)+Number(i.price||0));
  const brow=Object.entries(brands).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max=Math.max(...brow.map(x=>x[1]),1);
  document.getElementById('brandBars').innerHTML=brow.length?brow.map(([k,v])=>`
    <div class="card barRow">
      <div class="barTop"><div class="barName">${k}</div><div class="barVal">${money(v)}</div></div>
      <div class="barTrack"><div class="barFill" style="width:${(v/max)*100}%"></div></div>
    </div>`).join(''):`<div class="empty">未有數據。</div>`;
}
async function saveRecord(){
  const saveBtn=document.getElementById('saveBtn');
  const id=saveBtn.dataset.editing||uid();
  const old=items.find(x=>x.id===id);
  let image=old?.image||'';
  const photo=document.getElementById('photo').files[0]||document.getElementById('photoLibrary').files[0];
  if(photo) image=await toDataURL(photo);
  const rec={
    id,
    name:document.getElementById('name').value.trim(),
    brand:document.getElementById('brand').value.trim(),
    series:document.getElementById('series').value.trim(),
    itemCode:document.getElementById('itemCode').value.trim(),
    price:document.getElementById('price').value,
    currentValue:document.getElementById('currentValue').value,
    date:document.getElementById('date').value,
    status:document.getElementById('status').value,
    category:document.getElementById('category').value.trim()||'其他',
    location:document.getElementById('location').value.trim(),
    sellPrice:document.getElementById('sellPrice').value,
    sourceLink:document.getElementById('sourceLink').value.trim(),
    note:document.getElementById('note').value.trim(),
    image
  };
  if(old) items=items.map(x=>x.id===id?rec:x); else items.unshift(rec);
  save();
  clearForm();
  document.getElementById('backupStatus').textContent='已儲存到 V8 本地資料庫';
  render();
  showPage('pageCollection');
}
function clearForm(){
  ['name','brand','series','itemCode','price','currentValue','date','category','location','sellPrice','sourceLink','note','photo','photoLibrary'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    if(el.type==='file') el.value=''; else el.value='';
  });
  document.getElementById('status').value='未開封';
  delete document.getElementById('saveBtn').dataset.editing;
}
window.editItem=function(id){
  const i=items.find(x=>x.id===id); if(!i) return;
  document.getElementById('name').value=i.name||'';
  document.getElementById('brand').value=i.brand||'';
  document.getElementById('series').value=i.series||'';
  document.getElementById('itemCode').value=i.itemCode||'';
  document.getElementById('price').value=i.price||'';
  document.getElementById('currentValue').value=i.currentValue||'';
  document.getElementById('date').value=i.date||'';
  document.getElementById('status').value=i.status||'未開封';
  document.getElementById('category').value=i.category||'';
  document.getElementById('location').value=i.location||'';
  document.getElementById('sellPrice').value=i.sellPrice||'';
  document.getElementById('sourceLink').value=i.sourceLink||'';
  document.getElementById('note').value=i.note||'';
  document.getElementById('saveBtn').dataset.editing=id;
  showPage('pageAdd');
}
window.deleteItem=function(id){
  if(!confirm('確定刪除呢件收藏？')) return;
  items=items.filter(x=>x.id!==id);
  save();
  document.getElementById('backupStatus').textContent='已刪除 1 件收藏';
  render();
}
function exportBackup(){
  const payload={
    app:'Figure Collector V8',
    version:1,
    exported_at:new Date().toISOString(),
    count:items.length,
    items
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='figure_collector_v8_backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById('backupStatus').textContent='已匯出 JSON 備份';
}
function importBackup(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      const imported=Array.isArray(parsed)?parsed:(parsed.items||[]);
      if(!Array.isArray(imported)) throw new Error('invalid backup');
      items=imported.map(normalizeRecord).filter(Boolean);
      save();
      document.getElementById('backupStatus').textContent='已成功匯入 JSON 備份';
      render();
      showPage('pageCollection');
    }catch(e){
      document.getElementById('backupStatus').textContent='匯入失敗：檔案格式不正確';
    }
  };
  reader.readAsText(file,'utf-8');
}
document.getElementById('saveBtn').onclick=saveRecord;
document.getElementById('exportBtn').onclick=exportBackup;
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=(e)=>{const f=e.target.files[0]; if(f) importBackup(f);}
document.getElementById('clearBtn').onclick=()=>{
  if(!confirm('確定清空全部收藏資料？建議先匯出備份。')) return;
  items=[]; save(); render();
  document.getElementById('backupStatus').textContent='已清空資料';
}
function render(){refreshCategories();renderTop();renderList();renderStats()}
loadData();
render();
</script>
</body>
</html
